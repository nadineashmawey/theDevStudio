<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create New Course – Curriculum</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
 <link rel="stylesheet" href="../../css/create step 2.css">
 
</head>
<body>


  <div class="page-wrapper">

    <!-- HEADER -->
    <h1 class="course-title">Create New Course</h1>
    <p class="course-decription">Share your knowledge with students worldwide</p>

    <!-- STEPPER — step 1 & 2 active -->
    <div class="stepper">
      <div class="step active">
        <div class="step-circle">1</div>
        <div class="step-label">Basic Info</div>
      </div>
      <div class="step-line done"></div>
      <div class="step active">
        <div class="step-circle">2</div>
        <div class="step-label">Curriculum</div>
      </div>
      <div class="step-line pending"></div>
      <div class="step inactive">
        <div class="step-circle">3</div>
        <div class="step-label">Pricing</div>
      </div>
    </div>

    <!-- WHAT WILL STUDENTS LEARN -->
    <div class="learn-box">
      <h3 class="learn-title">What will students learn?</h3>

      <div id="outcomes-list">
        <div class="outcome-item">
          <input type="text" class="form-input" placeholder="e.g., Build responsive websites"/>
          <button class="btn-remove"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>

      <button class="btn-add" id="add-outcome">
        <i class="fa-solid fa-plus"></i> Add Learning Outcome
      </button>
    </div>

    <!-- COURSE SECTIONS -->
    <div class="learn-box">
      <h3 class="learn-title">Course Sections</h3>

      <div id="sections-list">
        <div class="section-card">
          <div class="form-group">
            <input type="text" class="form-input" placeholder="Section title"/>
          </div>
          <div class="form-group">
            <input type="text" class="form-input" placeholder="Lesson title"/>
          </div>
          <button class="btn-add">
            <i class="fa-solid fa-plus"></i> Add Lesson
          </button>
        </div>
      </div>

      <button class="btn-add-section" id="add-section">
        <i class="fa-solid fa-plus"></i> Add Section
      </button>
    </div>

    <!-- BACK + NEXT BUTTONS -->
    <div class="btn-row">
      <button class="btn-back">Back</button>
      <button class="btn-enroll">Next: Set Price</button>
    </div>

  </div>


 <script src="../../js/create-step2-js.js"></script>
</body>
</html>
