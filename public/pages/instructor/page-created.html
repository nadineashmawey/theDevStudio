<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course Created!</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:       #FF40A0;
      --pink-light: #FFB7E6;
      --yellow:     #F0FE72;
      --teal:       #60A3A6;
      --bg:         #0A0E27;
      --surface:    #1A203A;
      --border:     rgba(255, 255, 255, 0.08);
      --text-white: #FFFFFC;
      --text-muted: #BDC2C9;
      --text-body:  #C8D0E7;
      --font:       'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-white);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-wrapper {
      text-align: center;
      padding: 48px;
      animation: fadeIn 0.6s ease both;
    }

    /* icon circle */
    .success-icon {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), var(--yellow));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      margin: 0 auto 32px;
      animation: pop 0.5s 0.3s ease both;
    }

    .success-title {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--text-white);
    }

    .success-subtitle {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 40px;
      line-height: 1.7;
    }

    /* countdown ring */
    .countdown-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .countdown-ring {
      position: relative;
      width: 72px;
      height: 72px;
    }

    .countdown-ring svg {
      transform: rotate(-90deg);
    }

    .countdown-ring circle {
      fill: none;
      stroke-width: 4;
    }

    .ring-bg {
      stroke: var(--border);
    }

    .ring-progress {
      stroke: var(--teal);
      stroke-linecap: round;
      stroke-dasharray: 201;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }

    .countdown-number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      font-weight: 800;
      color: var(--text-white);
    }

    .countdown-text {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* go to dashboard button */
    .btn-dashboard {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--pink), var(--pink-light));
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 16px 36px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-dashboard:hover { opacity: 0.9; transform: translateY(-2px); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="success-wrapper">

    <!-- icon -->
    <div class="success-icon">🎉</div>

    <!-- text -->
    <h1 class="success-title">Course Created!</h1>
    <p class="success-subtitle">
      Your course has been published successfully.<br>
      Students can now enroll and start learning.
    </p>

    <!-- countdown -->
    <div class="countdown-wrapper">
      <div class="countdown-ring">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="ring-bg" cx="36" cy="36" r="32"/>
          <circle class="ring-progress" id="ring" cx="36" cy="36" r="32"/>
        </svg>
        <div class="countdown-number" id="countdown">10</div>
      </div>
      <div class="countdown-text">Redirecting to dashboard...</div>
    </div>

    <!-- manual button -->
    <a href="dashboard.html" class="btn-dashboard">
      Go to Dashboard
    </a>

  </div>

  <script>
    const ring = document.getElementById('ring');
    const countdownEl = document.getElementById('countdown');
    const total = 10;
    const circumference = 201; // 2 * pi * 32

    let seconds = total;

    const interval = setInterval(() => {
      seconds--;
      countdownEl.textContent = seconds;

      // shrink the ring
      const offset = circumference * (1 - seconds / total);
      ring.style.strokeDashoffset = offset;

      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = 'dashboard.html';
      }
    }, 1000);
  </script>

</body>
</html>
