<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create New Course – Pricing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet"href="../../css/create-step3-css.css">
</head>
<body>

  <div class="page-wrapper">

    <!-- HEADER -->
    <h1 class="course-title">Create New Course</h1>
    <p class="course-decription">Share your knowledge with students worldwide</p>

    <!-- STEPPER — all 3 active -->
    <div class="stepper">
      <div class="step active">
        <div class="step-circle">1</div>
        <div class="step-label">Basic Info</div>
      </div>
      <div class="step-line done"></div>
      <div class="step active">
        <div class="step-circle">2</div>
        <div class="step-label">Curriculum</div>
      </div>
      <div class="step-line done"></div>
      <div class="step active">
        <div class="step-circle">3</div>
        <div class="step-label">Pricing</div>
      </div>
    </div>

    <!-- PRICING FORM -->
    <div class="learn-box">

      <!-- two inputs side by side — reusing learn-grid -->
      <div class="learn-grid">
        <div class="form-group">
          <label class="lessons">Course Price ($) <span>*</span></label>
          <input type="number" class="form-input" id="price-input" placeholder="49.99" value="0"/>
        </div>
        <div class="form-group">
          <label class="lessons">Course Duration <span>*</span></label>
          <input type="text" class="form-input" placeholder="e.g., 40 hours"/>
        </div>
      </div>

      <!-- COURSE PREVIEW -->
      <div class="preview-card">
        <h3 class="learn-title">Course Preview</h3>
        <div class="preview-row">
          <span class="preview-label">Title:</span>
          <span class="preview-value">Not set</span>
        </div>
        <div class="preview-row">
          <span class="preview-label">Category:</span>
          <span class="preview-value">Web Development</span>
        </div>
        <div class="preview-row">
          <span class="preview-label">Level:</span>
          <span class="preview-value">Beginner</span>
        </div>
        <div class="preview-row">
          <span class="preview-label">Sections:</span>
          <span class="preview-value">1</span>
        </div>
        <div class="preview-row">
          <span class="preview-label">Price:</span>
          <span class="preview-value pink" id="preview-price">$0</span>
        </div>
      </div>

    </div>

    <!-- BACK + PUBLISH BUTTONS -->
    <div class="btn-row">
      <button class="btn-back">Back</button>
      <button class="btn-publish">Publish Course</button>
    </div>

  </div>

  <script src="../../js/create-step3-js.js"></script>

</body>
</html>
