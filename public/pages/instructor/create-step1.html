<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create New Course – EduPlatform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../css/create-step1-css.css">
  <link rel="stylesheet" href="/public/css/navbar-css.css">

</head>
<body>

  <div class="page-wrapper">

    <!-- HEADER -->
    <h1 class="course-title">Create New Course</h1>
    <p class="course-decription">Share your knowledge with students worldwide</p>

    <!-- STEPPER -->
    <div class="stepper">
      <div class="step active">
        <div class="step-circle">1</div>
        <div class="step-label">Basic Info</div>
      </div>
      <div class="step-line"></div>
      <div class="step inactive">
        <div class="step-circle">2</div>
        <div class="step-label">Curriculum</div>
      </div>
      <div class="step-line"></div>
      <div class="step inactive">
        <div class="step-circle">3</div>
        <div class="step-label">Pricing</div>
      </div>
    </div>

    <!-- FORM CARD — reusing learn-box -->
    <div class="learn-box">

      <div class="form-group">
        <label class="lessons">Course Title <span>*</span></label>
        <input type="text" class="form-input" placeholder="e.g., Complete Web Development Bootcamp"/>
      </div>

      <div class="form-group">
        <label class="lessons">Short Description <span>*</span></label>
        <input type="text" class="form-input" placeholder="Brief one-line description"/>
      </div>

      <div class="form-group">
        <label class="lessons">Full Description <span>*</span></label>
        <textarea class="form-input" placeholder="Detailed course description..."></textarea>
      </div>

      <!-- reusing learn-grid for two columns -->
      <div class="learn-grid">
        <div class="form-group">
          <label class="lessons">Category <span>*</span></label>
          <select class="form-input">
            <option>Web Development</option>
            <option>Data Science</option>
            <option>Design</option>
            <option>Business</option>
          </select>
        </div>
        <div class="form-group">
          <label class="lessons">Level <span>*</span></label>
          <select class="form-input">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="lessons">Course Thumbnail</label>
      <div class="upload-area" id="upload-area">
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <div class="upload-icon">
    <i class="fa-solid fa-arrow-up-from-bracket"></i>
  </div>
  <div class="upload-text">Click to upload or drag and drop</div>
  <div class="upload-hint">PNG, JPG up to 5MB</div>
</div>
</div>

      <!-- reusing btn-enroll -->
      <button class="btn-enroll">Next: Add Curriculum</button>

    </div>

  </div>
 <script src="../../js/create-step1-js.js" defer></script>
 <script src="/public/js/main-navbar.js"></script>
</body>
</html>
