<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
     <link rel="stylesheet" href="/public/css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">  

</head>
<body>
    <div class="container">
        <h4 class="back-link">
            <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"
                stroke="currentColor" stroke-width="40" fill="currentColor">
                <path d="M73.4 297.4C60.9 309.9 60.9 330.2 73.4 342.7L233.4 502.7C245.9 515.2 
                266.2 515.2 278.7 502.7C291.2 490.2 291.2 469.9 278.7 457.4L173.3 352L544 
                352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L173.3 288L278.7 
                182.6C291.2 170.1 291.2 149.8 278.7 137.3C266.2 124.8 245.9 124.8 233.4 
                137.3L73.4 297.3z"/>
            </svg>
            <a href="#">Back to Profile</a>
        </h4>

        <h1 class="edit-title">Edit Profile</h1>

     
        <div class="avatar-card">

            <h2>Choose your Avatar</h2>
            <div class="grid-avatars">
                <img src="../../../../../images/avatars/avatar1g.png" alt="Avatar 1">
                <img src="../../../../../images/avatars/avatar2g.png" alt="Avatar 2">
                <img src="../../../../../images/avatars/avatar3g.png" alt="Avatar 3">
                <img src="../../../../../images/avatars/avatar4b.png" alt="Avatar 4">
                <img src="../../../../../images/avatars/avatar5g.png" alt="Avatar 5">
                <img src="../../../../../images/avatars/avatar6g.png" alt="Avatar 6">
                <img src="../../../../../images/avatars/avatar7b.png" alt="Avatar 7">
                <img src="../../../../../images/avatars/avatar8g.png" alt="Avatar 8">
                <img src="../../../../../images/avatars/avatar9b.png" alt="Avatar 9">
                <img src="../../../../../images/avatars/avatar10b.png" alt="Avatar 10">
            </div>

            <div class="selected-avatar">
                <img id="selected-img" src="../../../../../images/avatars/avatar1g.png" alt="Selected Avatar">
                <div class="selected-info">
                    <p class="selected-title">Selected Avatar</p>
                    <p class="selected-desc">This will be your new profile picture</p>
                </div>
            </div>

        </div>

       <div class="personal-info">
       <h2>Profile Information</h2>

      <div class="fields-row">
        <div class="field-group">
            <label class="labels">Full Name</label>
            <span class="field-icon"><i class="fa-regular fa-user"></i></span>
            <input class="inputs" type="text" value=" Jana Mohamed" />
        </div>
        <div class="field-group">
            <label class="labels">Username</label>
            <span class="field-icon"><i class="fa-regular fa-user"></i></span>
            <input class="inputs" type="text" value="jana" />
        </div>
    </div>

      <div class="field-group">
        <label class="labels">Email Address</label>
        <span class="field-icon"><i class="fa-regular fa-envelope"></i></span>
        <input class="inputs" id="email" type="email" value="jana@gmail.com" />
      </div>

        <div class="field-group">
        <label class="labels">Bio</label>
        <span class="field-icon"></span>
        <textarea class="inputs">Passionate learner exploring web development and data science. Love solving coding challenges!</textarea>
        </div>

       <div class="field-group">
        <label class="labels">Location</label>
        <span class="field-icon"><i class="fa-solid fa-location-dot" ></i></span>
        <input class="inputs" type="text" value="San Francisco, CA" />
      
        </div>
  
        
       </div>
        <div class="pass-change">
            <h2>Change Password</h2>
              <div class="field-group">
               <label for="currentpass" class="labels">Current Password</label>
               <span class="field-icon"><i class="fa-solid fa-lock"></i></span>
               <input type="password" name="currentpass"  id ="currentpass" class="pass-input" placeholder="Enter current password"/>
               </div>
               <div class="field-group">
                 <label for="newpass" class="labels">New Password</label>
                 <span class="field-icon"><i class="fa-solid fa-lock"></i></span>
                 <input type="password" name="newpass"  id ="newpass" class="pass-input" placeholder="Enter new password">

                </div>
              
            </div>
              
         <div class="bttns">
        
               <button class="save-bttn" onclick="window.location='#'">Save Changes</button>
            
           
           
                <button class="cancel-bttn" onclick="window.location='#'">Cancel</button>
         
        </div>
         
        </div>
       
         
    </div>
    
            



    <script>
        const avatars = document.querySelectorAll('.grid-avatars img');
        const selectedImg = document.getElementById('selected-img');

        avatars.forEach(avatar => {
            avatar.addEventListener('click', () => {
                avatars.forEach(a => a.classList.remove('active'));
                avatar.classList.add('active');
                selectedImg.src = avatar.src;
                selectedImg.alt = avatar.alt;
            });
        });

        avatars[0].classList.add('active');
    </script>
</body>
</html>
