<!DOCTYPE html>
<html>
<head>
    <title>Challenge Description</title>

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/public/css/challenge-description.css">
</head>

<body>

<div class="container">
    <div class="back-link">
        <i class="fa-solid fa-arrow-left"></i>
        <a href="javascript:history.back()">Back</a>
    </div>

    <div class="challenge-layout">

     
        <div class="challenge-main">
            <div class="challenge-card"> 
                <div class="badge-row">
                    <span id="badge-difficulty" class="badge"></span>
                    <span id="badge-category" class="badge badge-category"></span>

                    <span class="points-badge">
                        <i class="fa-solid fa-bolt"></i>
                        <span id="header-points"></span>
                    </span>
                </div>

                <h2 id="challenge-title"></h2>
                <p id="challenge-summary" class="summary-text"></p>
            </div>

          
            <div class="challenge-card">
                <h2>Problem Description</h2>
                <p id="challenge-description"></p>
                <div id="challenge-details"></div>
            </div>

            
            <div class="challenge-card">
                <h2>Examples</h2>
                <div id="challenge-examples"></div>
            </div>

                       
            <div class="challenge-card">
                <div class="solution-header">
                    <h2>Your Solution</h2>

                    
                    <select id="lang-select">
                        <option>JavaScript</option>
                        <option>Python</option>
                        <option>Java</option>
                    </select>
                </div>

                
                <textarea id="code-editor" spellcheck="false"></textarea>

                <button class="start-btn">Start Challenge</button>
            </div>

        </div>

        <div class="challenge-sidebar">

            
            <div class="challenge-card">
                <h2>Challenge Info</h2>

                <div class="info-list">

                    <div class="info-item">
                        <div class="info-icon pink">
                            <i class="fa-solid fa-bolt"></i>
                        </div>
                        <div>
                            <p id="info-points" class="info-value"></p>
                            <p class="info-label">Reward</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="info-icon teal">
                            <i class="fa-solid fa-code"></i>
                        </div>
                        <div>
                            <p id="info-difficulty" class="info-value"></p>
                            <p class="info-label">Difficulty</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="info-icon yellow">
                            <i class="fa-regular fa-clock"></i>
                        </div>
                        <div>
                            <p id="info-time" class="info-value"></p>
                            <p class="info-label">Time Limit</p>
                        </div>
                    </div>

                </div>
            </div>

        
            <div class="challenge-card">
                <h2>Submission Stats</h2>

                <div class="stats-list">
                    <div class="stat-row">
                        <span>Total Submissions</span>
                        <span id="total-submissions"></span>
                    </div>

                    <div class="stat-row">
                        <span>Accepted</span>
                        <span id="accepted" class="stat-green"></span>
                    </div>

                    <div class="stat-row">
                        <span>Success Rate</span>
                        <span id="success-rate" class="stat-yellow"></span>
                    </div>
                </div>
            </div>

            
           

        </div>

    </div>
</div>

<script src="/public/js/challenge-description.js"></script>

</body>
</html>
