
<DOCCTYPE! HTML>

<style>
  .navbar {
  background: #0a0e27;
  padding: 20px 24px;
}


.nav-top {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 18px;
}


.search-bar {
  flex: 1;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #141a3a;
  color: white;
  font-size: 14px;
}

.search-bar::placeholder {
  color: #8b92a9;
}


.filter-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  padding: 10px 16px;
  border-radius: 12px;
  color: white;
  cursor: pointer;
}


.chip-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}


.chip {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #141a3a;
  color: #cfd3ff;
  font-size: 13px;
  cursor: pointer;
}


.chip.active {
  background: linear-gradient(90deg, #e91e8c, #ff6ec7);
  color: white;
  border: none;
}


.chip.active-green {
  background: #2ec4b6;
  color: #0a0e27;
  border: none;
}
</style>




<div class="navbar">


  <div class="nav-top">
    <input type="text" placeholder="Search courses..." class="search-bar">

    <button class="filter-btn">
      <i class="fa-solid fa-sliders"></i> Filters
    </button>
  </div>

  <div class="chip-row">
    <button class="chip active">All</button>
    <button class="chip">Web Development</button>
    <button class="chip">Data Science</button>
    <button class="chip">Mobile Development</button>
    <button class="chip">Design</button>
    <button class="chip">Machine Learning</button>
  </div>

 
  <div class="chip-row second">
    <button class="chip active-green">All</button>
    <button class="chip">Beginner</button>
    <button class="chip">Intermediate</button>
    <button class="chip">Advanced</button>
  </div>

</div>
</DOCCTYPE>
